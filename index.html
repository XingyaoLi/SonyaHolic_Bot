<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SonyaHolic搬运站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        .tweet-card { background-color: #000; color: #e7e9ea; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .tweet-text { font-size: 15px; line-height: 20px; white-space: pre-wrap; word-wrap: break-word; }
        .quote-box { border: 1px solid #2f3336; border-radius: 12px; padding: 12px; margin-top: 12px; background-color: #000; }
        /* 智能网格布局 */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; }
        .grid-3 img:first-child { grid-row: span 2; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <div class="bg-black px-5 py-4 text-white shadow-lg sticky top-0 z-40 flex justify-between items-center">
        <h1 class="text-lg font-bold flex items-center gap-2"><i class="fa-brands fa-x-twitter text-xl"></i>SonyaHolic搬运站</h1>
    </div>

    <div class="p-4 max-w-lg mx-auto mt-2 space-y-6">
        <div class="bg-white rounded-3xl shadow-sm border border-gray-200 p-5 space-y-4">
            <input type="text" id="linkInput" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-300 rounded-2xl text-sm" placeholder="粘贴 X 链接...">
            <button id="extractBtn" onclick="processLink()" class="w-full bg-black text-white font-bold py-3.5 rounded-2xl">链接抓取 & 翻译</button>
        </div>

        <div id="resultArea" class="hidden space-y-5">
            <div class="bg-white rounded-3xl shadow-sm border border-gray-200 p-4" id="screenshotOutput"></div>
            <div class="bg-white rounded-3xl shadow-sm border border-gray-200 p-5">
                <div id="finalText" class="bg-gray-50 p-4 rounded-xl text-gray-900 text-[13px] whitespace-pre-wrap leading-relaxed border"></div>
                <button onclick='copyText()' class="mt-4 w-full bg-black text-white font-bold py-3.5 rounded-xl">复制文案</button>
            </div>
        </div>
    </div>

    <!-- 渲染画板 -->
    <div style="position: absolute; left: -9999px; top: 0;">
        <div id="renderTemplate" class="tweet-card w-[420px] p-4 bg-black">
            <div class="flex items-center gap-3 mb-3">
                <img id="renderAvatar" class="w-12 h-12 rounded-full object-cover">
                <div>
                    <div class="font-bold text-[15px]" id="renderName"></div>
                    <div class="text-[#71767b] text-[15px]" id="renderHandle"></div>
                </div>
            </div>
            <div id="renderText" class="tweet-text mb-3"></div>
            <div id="renderImages" class="rounded-2xl overflow-hidden mb-3 hidden"></div>
            <div id="renderQuote" class="quote-box hidden">
                <div id="quoteText" class="tweet-text text-[14px]"></div>
            </div>
            <div class="text-[#71767b] text-[15px] mt-3" id="renderTime"></div>
        </div>
    </div>

    <script>
        async function processLink() {
            // ... (复用之前的 fetch 逻辑)
            // 修改 buildUIAndScreenshot 中的图片渲染逻辑：
            const imgContainer = document.getElementById('renderImages');
            const count = tweet.imagesBase64.length;
            if (count > 0) {
                imgContainer.className = `rounded-2xl overflow-hidden mb-3 grid ${count === 2 ? 'grid-2' : count === 3 ? 'grid-3' : count === 4 ? 'grid-4' : 'grid-cols-1'}`;
                imgContainer.innerHTML = tweet.imagesBase64.slice(0, 4).map(b64 => `<img src="${b64}" class="w-full h-full object-cover aspect-square">`).join('');
            }
            
            // 修改引用处理逻辑：
            if (tweet.quoteInfo) {
                // 确保引用内容上方有明显的空行效果
                document.getElementById('renderQuote').innerHTML = `<div class="mb-2 text-[#71767b]">转发内容：</div>` + document.getElementById('renderQuote').innerHTML;
            }
            // ... 后续逻辑保持不变
        }
    </script>
</body>
</html>
